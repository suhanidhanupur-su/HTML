<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

</head>
<body>
    <h1>Registration Form</h1>
    <div class="card p-5 bg-primary">
     <form action="">
        <label for="" class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Enter your name">

        <label for="" class="form-label">Mobile number</label>
        <input type="number" class="form-control" placeholder="Enter your mobile number">

        <label for="" class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="123@gmail.com">

         <label for="" class="form-label">D.O.B</label>
        <input type="date" class="form-control">


        <label for="" class="form-label">Gender</label><br>

        <input type="radio" name="Gender">
        <label for="" class="form-label">Male</label>

        <input type="radio" name="Gender">
        <label for="" class="form-label">Female</label>

        <input type="radio" name="Gender">
        <label for="" class="form-label">Other</label><br>
        
       <input type="checkbox" >
       <label for="" class="form-label">I agree to all the terms and conditions.</label>

       <center><button type="button">Submit</button></center>


     </form>
    </div> 
</body>
</html>
